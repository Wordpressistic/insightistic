{
    "name": "wordpressistic/insightistic",
    "description": "GA4, Search Console & PageSpeed analytics with on-demand AI insights for WordPress.",
    "type": "wordpress-plugin",
    "license": "GPL-2.0-or-later",
    "require": {
        "php": ">=8.0"
    },
    "require-dev": {
        "squizlabs/php_codesniffer": "^3.9",
        "wp-coding-standards/wpcs": "^3.1",
        "phpcompatibility/phpcompatibility-wp": "^2.1",
        "dealerdirect/phpcodesniffer-composer-installer": "^1.0"
    },
    "config": {
        "allow-plugins": {
            "dealerdirect/phpcodesniffer-composer-installer": true
        }
    },
    "scripts": {
        "lint": "find insightistic -name '*.php' -print0 | xargs -0 -n1 -P4 php -l",
        "phpcs": "phpcs",
        "phpcbf": "phpcbf",
        "test": [
            "@lint",
            "php tests/test-encryption.php"
        ]
    }
}
